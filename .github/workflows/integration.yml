name: CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.run_number }}-${{ github.sha }}
      KUSTOMIZATION_FILE: k8s/argocd-ready/overlays/eks/kustomization.yml

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/food-ordering-backend:${{ env.IMAGE_TAG }} ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/food-ordering-backend:${{ env.IMAGE_TAG }}

      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/food-ordering-frontend:${{ env.IMAGE_TAG }} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/food-ordering-frontend:${{ env.IMAGE_TAG }}

      - name: Build & Push Admin
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/food-ordering-admin:${{ env.IMAGE_TAG }} ./admin-panel
          docker push ${{ secrets.DOCKER_USERNAME }}/food-ordering-admin:${{ env.IMAGE_TAG }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update image tags in kustomization
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          yq -i '
            (.images[] | select(.name == "jenishchauhan/food-ordering-backend").newName) = (strenv(DOCKER_USERNAME) + "/food-ordering-backend") |
            (.images[] | select(.name == "jenishchauhan/food-ordering-backend").newTag) = strenv(IMAGE_TAG) |
            (.images[] | select(.name == "jenishchauhan/food-ordering-frontend").newName) = (strenv(DOCKER_USERNAME) + "/food-ordering-frontend") |
            (.images[] | select(.name == "jenishchauhan/food-ordering-frontend").newTag) = strenv(IMAGE_TAG) |
            (.images[] | select(.name == "jenishchauhan/food-ordering-admin").newName) = (strenv(DOCKER_USERNAME) + "/food-ordering-admin") |
            (.images[] | select(.name == "jenishchauhan/food-ordering-admin").newTag) = strenv(IMAGE_TAG)
          ' "${KUSTOMIZATION_FILE}"

      - name: Show manifest diff
        run: git diff -- "${KUSTOMIZATION_FILE}"

      - name: Commit & push changes
        run: |
          if git diff --quiet -- "${KUSTOMIZATION_FILE}"; then
            echo "No kustomization changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${KUSTOMIZATION_FILE}"
          git commit -m "ci: update image tags to ${IMAGE_TAG} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
