name: Docker Image CI

on:
  push:
    branches: ["main"]

env:
  IMAGE_TAG: ${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.docker_pass }}" | docker login -u "${{ secrets.docker_username }}" --password-stdin

      - name: Build backend image
        run: docker build -t ${{ secrets.docker_username }}/food-ordering-backend:${{ env.IMAGE_TAG }} ./backend

      - name: Build frontend image
        run: docker build -t ${{ secrets.docker_username }}/food-ordering-frontend:${{ env.IMAGE_TAG }} ./frontend

      - name: Build admin-panel image
        run: docker build -t ${{ secrets.docker_username }}/food-ordering-admin:${{ env.IMAGE_TAG }} ./admin-panel

      - name: Push backend image
        run: docker push ${{ secrets.docker_username }}/food-ordering-backend:${{ env.IMAGE_TAG }}

      - name: Push frontend image
        run: docker push ${{ secrets.docker_username }}/food-ordering-frontend:${{ env.IMAGE_TAG }}

      - name: Push admin-panel image
        run: docker push ${{ secrets.docker_username }}/food-ordering-admin:${{ env.IMAGE_TAG }}
