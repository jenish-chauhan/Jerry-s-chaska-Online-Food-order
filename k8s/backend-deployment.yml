# =============================================================================
# Backend Deployment
# Runs the Node.js Express API server
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: <your-dockerhub-username>/jerrys-backend:latest
          ports:
            - containerPort: 5000
          env:
            # ---------- Server ----------
            - name: PORT
              value: "5000"
            - name: NODE_ENV
              value: "production"
            # ---------- Database ----------
            # DB_HOST uses the Kubernetes Service DNS name for MySQL
            - name: DB_HOST
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "jerrys-secret-password"
            - name: DB_NAME
              value: "jerrys_chaska"
            # ---------- JWT ----------
            - name: JWT_SECRET
              value: "jerry-chaska-super-secret-key-2024"
            - name: JWT_EXPIRES_IN
              value: "24h"
            # ---------- CORS ----------
            - name: FRONTEND_URL
              value: "*"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
