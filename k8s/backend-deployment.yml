apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: food-ordering
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: food-ordering-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: NODE_ENV
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: FRONTEND_URL
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: food-ordering-secret
                  key: admin-email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: food-ordering-secret
                  key: admin-password
            - name: ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: food-ordering-secret
                  key: admin-name
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: food-ordering-secret
                  key: jwt-secret
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: food-ordering-secret
                  key: mongo-root-username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: food-ordering-secret
                  key: mongo-root-password
            - name: MONGO_URI
              value: mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@mongodb:27017/jerrys_chaska?authSource=admin
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
