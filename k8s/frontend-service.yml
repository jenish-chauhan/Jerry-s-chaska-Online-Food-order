# =============================================================================
# Frontend Service
# Exposes the frontend Deployment to external traffic
# Type: LoadBalancer for EKS / cloud clusters
#       Change to NodePort for local clusters (Minikube, kind)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
