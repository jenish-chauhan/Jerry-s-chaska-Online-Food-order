apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: food-ordering
data:
  PORT: "5000"
  NODE_ENV: "development"

  # IMPORTANT:
  # FRONTEND_URL is for BACKEND CORS validation.
  # This must contain the browser origins that open your frontend/admin panel.
  # You can now provide either:
  # - full origins like http://example.com or https://example.com:30081
  # - host-only values like example.com or 98.81.145.2
  #
  # Host-only values are recommended for EC2/KIND because they allow that host
  # on both NodePort services without tying CORS to a single port.
  #
  # DO NOT use Kubernetes service names like:
  # - http://frontend
  # - http://admin-panel
  #
  # Reason:
  # the browser origin is something like:
  # - http://192.168.49.2:30080
  # - http://192.168.49.2:30081
  # - http://127.0.0.1:xxxxx   (when using `minikube service --url`)
  #
  # In this backend code, if you provide only scheme + host without a port,
  # that host is allowed on ANY port.
  #
  # So this is a good Minikube/local practice value:
  # - http://127.0.0.1     -> allows minikube service --url localhost ports
  # - http://localhost     -> allows localhost ports
  # - http://172.19.0.2    -> allows Minikube IP NodePort access
  #
  # If your Minikube IP changes, update the last value.

  # If you are using EC2, add the public IP and public DNS host that the
  # browser actually uses. Include both if you open the app in both ways.
  FRONTEND_URL: "http://127.0.0.1 , http://100.53.15.81"

  MONGO_DATABASE: "jerrys_chaska"
