# =============================================================================
# MySQL Service
# Internal ClusterIP service — only reachable from within the cluster
# The backend connects to this service using the DNS name "mysql"
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
